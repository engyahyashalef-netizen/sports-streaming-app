[build]
builder = "nixpacks"

[deploy]
startCommand = "php artisan serve --host=0.0.0.0 --port=$PORT"
restartPolicyMaxRetries = 10
healthcheckPath = "/"

[env]
PORT = "8080"
APP_ENV = "production"
APP_DEBUG = "false"
APP_KEY = "base64:AltA9fYltNuAhreJLQHjfugRcb2F4KR0o0fWblFdWxE="
APP_URL = "https://endearing-vision-production.up.railway.app"
DB_CONNECTION = "sqlite"
LOG_CHANNEL = "stack"
LOG_LEVEL = "debug"
BROADCAST_CONNECTION = "log"
CACHE_STORE = "database"
QUEUE_CONNECTION = "database"
SESSION_DRIVER = "database"
SESSION_LIFETIME = "120"
