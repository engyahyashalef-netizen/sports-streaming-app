<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق البث المباشر للمباريات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 40px;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        
        .feature {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .feature h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .feature p {
            color: #666;
            font-size: 0.9em;
        }
        
        .cta-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.3s ease;
        }
        
        .cta-button:hover {
            transform: translateY(-2px);
        }
        
        .github-link {
            margin-top: 30px;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        
        .github-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 تطبيق البث المباشر للمباريات</h1>
        <p class="subtitle">شاهد جميع المباريات بجودة عالية وبث مباشر</p>
        
        <div class="features">
            <div class="feature">
                <h3>📺 بث مباشر</h3>
                <p>شاهد المباريات مباشرة بدون تأخير</p>
            </div>
            <div class="feature">
                <h3>🎯 جودة عالية</h3>
                <p>دعم جودات متعددة حسب سرعة الإنترنت</p>
            </div>
            <div class="feature">
                <h3>📱 متوافق</h3>
                <p>يعمل على جميع الأجهزة والمتصفحات</p>
            </div>
            <div class="feature">
                <h3>⚡ سريع</h3>
                <p>تحميل فوري وأداء عالية</p>
            </div>
        </div>
        
        <button class="cta-button" onclick="alert('قريباً: سيتم إطلاق النسخة الكاملة من التطبيق')">
            ابدأ الآن
        </button>
        
        <p class="github-link">
            <a href="https://github.com/engyahyashalef-netizen/sports-streaming-app" target="_blank">
                عرض المشروع على GitHub
            </a>
        </p>
    </div>
</body>
</html>
